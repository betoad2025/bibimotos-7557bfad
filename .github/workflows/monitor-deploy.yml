name: Monitor — Deploy Edge Functions

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Modo verbose (mostrar detalhes extras)'
        required: false
        default: 'false'
        type: boolean

permissions:
  actions: read
  contents: read

jobs:
  check-deploy-status:
    name: Status do Último Deploy
    runs-on: ubuntu-latest
    outputs:
      deploy_ok: ${{ steps.check.outputs.deploy_ok }}
      last_run_id: ${{ steps.check.outputs.last_run_id }}
      last_conclusion: ${{ steps.check.outputs.last_conclusion }}

    steps:
      - name: Verificar status do último Deploy Edge Functions
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 Consultando último run do Deploy Edge Functions..."
          RESPONSE=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/betoad2025/bibimotos-7557bfad/actions/workflows/deploy-functions.yml/runs?per_page=5&branch=main")
          LAST_RUN_ID=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          runs = data.get('workflow_runs', [])
          if runs:
              print(runs[0].get('id', '0'))
          else:
              print('0')
          " 2>/dev/null || echo "0")
          LAST_CONCLUSION=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          runs = data.get('workflow_runs', [])
          if runs:
              print(runs[0].get('conclusion', 'unknown') or 'in_progress')
          else:
              print('no_runs')
          " 2>/dev/null || echo "unknown")
          echo "   Último run: #$LAST_RUN_ID"
          echo "   Conclusão: $LAST_CONCLUSION"
          if [ "$LAST_CONCLUSION" = "success" ]; then
            echo "   ✅ Deploy Edge Functions: OK"
            echo "deploy_ok=true" >> $GITHUB_OUTPUT
          elif [ "$LAST_CONCLUSION" = "no_runs" ]; then
            echo "   ℹ️ Nenhum run encontrado ainda"
            echo "deploy_ok=true" >> $GITHUB_OUTPUT
          else
            echo "   ⚠️ Deploy Edge Functions com problema: $LAST_CONCLUSION"
            echo "deploy_ok=false" >> $GITHUB_OUTPUT
          fi
          echo "last_run_id=$LAST_RUN_ID" >> $GITHUB_OUTPUT
          echo "last_conclusion=$LAST_CONCLUSION" >> $GITHUB_OUTPUT
          echo ""
          echo "📋 Histórico dos últimos 5 runs:"
          echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          runs = data.get('workflow_runs', [])
          for r in runs[:5]:
              status = r.get('conclusion') or r.get('status', 'unknown')
              icon = '✅' if status == 'success' else ('🔄' if status in ['in_progress', 'queued'] else '❌')
              print(f'  {icon} #{r[\"id\"]} — {status} — {r[\"created_at\"]}')
          " 2>/dev/null || echo "  (não foi possível listar)"

  check-functions-health:
    name: Saúde das Edge Functions
    runs-on: ubuntu-latest
    outputs:
      functions_ok: ${{ steps.health.outputs.functions_ok }}
      function_count: ${{ steps.health.outputs.function_count }}

    steps:
      - name: Verificar Edge Functions deployadas no Supabase
        id: health
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: awfuqmmolozqwwdtepap
        run: |
          echo "🔍 Verificando Edge Functions no Supabase Bibi Motos ($PROJECT_REF)..."
          RESPONSE=$(curl -s \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.supabase.com/v1/projects/$PROJECT_REF/functions")
          FUNC_COUNT=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          if isinstance(data, list):
              print(len(data))
          else:
              print('0')
          " 2>/dev/null || echo "0")
          echo "   Funções deployadas: $FUNC_COUNT"
          if [ "$FUNC_COUNT" -gt 0 ] 2>/dev/null; then
            echo "   ✅ Edge Functions ativas: $FUNC_COUNT"
            echo "functions_ok=true" >> $GITHUB_OUTPUT
          else
            echo "   ⚠️ Nenhuma função encontrada ou erro na API"
            echo "functions_ok=false" >> $GITHUB_OUTPUT
          fi
          echo "function_count=$FUNC_COUNT" >> $GITHUB_OUTPUT

      - name: Testar endpoint health-check
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          PROJECT_REF: awfuqmmolozqwwdtepap
        run: |
          SUPABASE_URL="${VITE_SUPABASE_URL:-https://${PROJECT_REF}.supabase.co}"
          HEALTH_URL="${SUPABASE_URL}/functions/v1/health-check"
          echo "🌐 Testando endpoint: $HEALTH_URL"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            "$HEALTH_URL" 2>/dev/null || echo "000")
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "401" ]; then
            echo "   ✅ Endpoint respondendo (HTTP $HTTP_STATUS)"
          elif [ "$HTTP_STATUS" = "000" ]; then
            echo "   ⚠️ Timeout ou endpoint não acessível"
          else
            echo "   ℹ️ HTTP $HTTP_STATUS"
          fi

  check-migrations:
    name: Status das Migrations
    runs-on: ubuntu-latest

    steps:
      - name: Verificar migrations aplicadas no banco
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: awfuqmmolozqwwdtepap
        run: |
          echo "🗄️ Verificando migrations no banco Bibi Motos ($PROJECT_REF)..."
          RESPONSE=$(curl -s \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.supabase.com/v1/projects/$PROJECT_REF/database/migrations")
          MIGRATION_COUNT=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          try:
              data = json.load(sys.stdin)
              if isinstance(data, list):
                  print(len(data))
              else:
                  print('N/A')
          except:
              print('N/A')
          " 2>/dev/null || echo "N/A")
          echo "   Migrations aplicadas: $MIGRATION_COUNT"
          if [ "$MIGRATION_COUNT" != "N/A" ] && [ "$MIGRATION_COUNT" -gt 0 ] 2>/dev/null; then
            echo "   ✅ Banco com $MIGRATION_COUNT migration(s) aplicada(s)"
          else
            echo "   ℹ️ Não foi possível verificar migrations"
          fi

  summary:
    name: Sumário do Monitoramento
    runs-on: ubuntu-latest
    needs:
      - check-deploy-status
      - check-functions-health
      - check-migrations

    steps:
      - name: Gerar sumário do monitoramento
        run: |
          DEPLOY_OK="${{ needs.check-deploy-status.outputs.deploy_ok }}"
          FUNCTIONS_OK="${{ needs.check-functions-health.outputs.functions_ok }}"
          FUNC_COUNT="${{ needs.check-functions-health.outputs.function_count }}"
          LAST_RUN="${{ needs.check-deploy-status.outputs.last_run_id }}"
          CONCLUSION="${{ needs.check-deploy-status.outputs.last_conclusion }}"
          echo "## Monitor — Deploy Edge Functions BibiMotos" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Data/Hora** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| **Repositório** | betoad2025/bibimotos-7557bfad |" >> $GITHUB_STEP_SUMMARY
          echo "| **Supabase** | awfuqmmolozqwwdtepap (Bibi Motos) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Hostinger** | bibimotos.com.br |" >> $GITHUB_STEP_SUMMARY
          echo "| **Último Deploy Run** | [#${LAST_RUN}](https://github.com/betoad2025/bibimotos-7557bfad/actions/runs/${LAST_RUN}) — ${CONCLUSION} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Edge Functions** | ${FUNC_COUNT} deployadas |" >> $GITHUB_STEP_SUMMARY
          echo "| **Cloud Lovable** | ❌ BLOQUEADO |" >> $GITHUB_STEP_SUMMARY
          echo "| **IA Gateway Lovable** | ❌ BLOQUEADO |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$DEPLOY_OK" = "true" ] && [ "$FUNCTIONS_OK" = "true" ]; then
            echo "### ✅ Sistema Saudável" >> $GITHUB_STEP_SUMMARY
            echo "Deploy automático operando corretamente. Infraestrutura 100% privada." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ ATENÇÃO: Problema Detectado" >> $GITHUB_STEP_SUMMARY
            if [ "$DEPLOY_OK" != "true" ]; then
              echo "- **Deploy com falha** — Run [#${LAST_RUN}](https://github.com/betoad2025/bibimotos-7557bfad/actions/runs/${LAST_RUN})" >> $GITHUB_STEP_SUMMARY
            fi
            if [ "$FUNCTIONS_OK" != "true" ]; then
              echo "- **Edge Functions inacessíveis** — Verifique o Supabase" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "_Monitoramento automático a cada 30 minutos_" >> $GITHUB_STEP_SUMMARY

      - name: Falhar se houver problema crítico
        if: |
          needs.check-deploy-status.outputs.deploy_ok == 'false' ||
          needs.check-functions-health.outputs.functions_ok == 'false'
        run: |
          echo "::error title=Problema no Deploy BibiMotos::Deploy com falha ou Edge Functions inacessíveis."
          echo "Deploy OK    : ${{ needs.check-deploy-status.outputs.deploy_ok }}"
          echo "Functions OK : ${{ needs.check-functions-health.outputs.functions_ok }}"
          exit 1
