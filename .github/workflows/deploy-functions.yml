name: Deploy Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Forçar deploy de todas as funções'
        required: false
        default: 'false'
        type: boolean

jobs:
  infra-guard:
    name: Infra Guard — Bloquear referências Cloud
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verificar ausência de referências ao Cloud Lovable e IA Gateway
        run: |
          echo "🔍 Verificando referências proibidas ao Cloud Lovable e IA Gateway..."
          VIOLATIONS=0
          FORBIDDEN_PATTERNS=(
            "lovable\.app"
            "lovable-uploads\.com"
            "gpteng\.co"
            "gptengineer\.app"
            "supabase\.lovable"
            "lovable-cloud"
            "LOVABLE_TOKEN"
            "LOVABLE_API_KEY"
            "lovable\.dev/api"
            "api\.lovable\.dev"
          )
          FILES_TO_CHECK=$(find . \
            -type f \
            -not -path "./.git/*" \
            -not -path "./node_modules/*" \
            -not -path "./dist/*" \
            -not -path "./.github/workflows/infra-guard.yml" \
            -not -path "./.github/workflows/deploy-functions.yml" \
            \( -name "*.ts" -o -name "*.tsx" -o -name "*.js" -o -name "*.jsx" \
               -o -name "*.json" -o -name "*.env*" -o -name "*.toml" \
               -o -name "*.yml" -o -name "*.yaml" \) \
            2>/dev/null)
          for PATTERN in "${FORBIDDEN_PATTERNS[@]}"; do
            MATCHES=$(echo "$FILES_TO_CHECK" | xargs grep -l "$PATTERN" 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "❌ VIOLAÇÃO: '$PATTERN' encontrado em: $MATCHES"
              VIOLATIONS=$((VIOLATIONS + 1))
            fi
          done
          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "🚫 BLOQUEADO: $VIOLATIONS referência(s) proibida(s). Deploy cancelado."
            exit 1
          fi
          echo "✅ Infraestrutura 100% privada. Prosseguindo com deploy."

  deploy-functions:
    name: Deploy Edge Functions no Supabase Privado
    runs-on: ubuntu-latest
    needs: infra-guard
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: awfuqmmolozqwwdtepap

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Instalar Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz | tar -xz
          sudo mv supabase /usr/local/bin/supabase
          supabase --version

      - name: Descobrir funções automaticamente e fazer deploy
        run: |
          echo "🚀 Iniciando deploy das Edge Functions..."
          echo "   Projeto Supabase: $PROJECT_REF (Bibi Motos)"
          echo ""
          FUNCTIONS_DIR="supabase/functions"
          DEPLOYED=0
          FAILED=0
          SKIPPED=0
          if [ ! -d "$FUNCTIONS_DIR" ]; then
            echo "⚠️ Diretório $FUNCTIONS_DIR não encontrado. Nenhuma função para deployar."
            exit 0
          fi
          for FUNC_DIR in "$FUNCTIONS_DIR"/*/; do
            FUNC_NAME=$(basename "$FUNC_DIR")
            if [[ "$FUNC_NAME" == _* ]]; then
              echo "⏭️  Ignorando diretório de suporte: $FUNC_NAME"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi
            if [ ! -f "$FUNC_DIR/index.ts" ]; then
              echo "⚠️  Ignorando $FUNC_NAME (sem index.ts)"
              SKIPPED=$((SKIPPED + 1))
              continue
            fi
            echo "📦 Deployando: $FUNC_NAME"
            if supabase functions deploy "$FUNC_NAME" \
              --project-ref "$PROJECT_REF" \
              --no-verify-jwt 2>&1; then
              echo "   ✅ $FUNC_NAME deployado com sucesso"
              DEPLOYED=$((DEPLOYED + 1))
            else
              echo "   ❌ Falha ao deployar $FUNC_NAME"
              FAILED=$((FAILED + 1))
            fi
          done
          echo ""
          echo "📊 Resumo do deploy:"
          echo "   ✅ Deployadas: $DEPLOYED"
          echo "   ❌ Falhas:     $FAILED"
          echo "   ⏭️  Ignoradas:  $SKIPPED"
          if [ "$FAILED" -gt 0 ]; then
            echo "🚫 Deploy concluído com $FAILED falha(s)."
            exit 1
          fi
          echo "🎉 Deploy concluído com sucesso! $DEPLOYED função(ões) deployada(s)."

      - name: Linkar ao projeto Supabase privado
        run: |
          echo "🔗 Linkando ao projeto Supabase $PROJECT_REF..."
          supabase link --project-ref "$PROJECT_REF" || true

      - name: Aplicar migrations no banco privado
        run: |
          echo "🗄️ Aplicando migrations no banco Bibi Motos ($PROJECT_REF)..."
          supabase db push --yes || echo "⚠️ Aviso: Algumas migrations podem já estar aplicadas. Continuando..."
          echo "✅ Migrations processadas."
